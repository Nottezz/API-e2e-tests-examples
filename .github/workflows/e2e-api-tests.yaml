name: Tests with Allure Report per PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Setup UV
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run tests
        run: uv run pytest --alluredir ./allure-results

      - name: Setup Node.js for Allure 3
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Allure 3 CLI
        run: npm install -g allure

      - name: Copy previous history if exists
        run: |
          mkdir -p ./allure-results/history
          if [ -f ./allure-report/allure-history.jsonl ]; then
            cp ./allure-report/allure-history.jsonl ./allure-results/history/
            echo "Previous history copied"
          else
            echo "No previous history found"
          fi

      - name: Generate Allure 3 Report with history
        run: |
          npx allure generate ./allure-results --clean -o ./allure-report

      - name: Deploy Allure report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: ''
          keep_files: true
          exclude_assets: ""

      - name: Comment PR with Allure Report link
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ✅ Allure report for this PR is available [here](https://${{ github.repository_owner }}.github.io/${{ github.repository }}/)