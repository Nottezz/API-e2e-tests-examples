name: Run e2e tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Allure history
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Setup UV
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Setup Node.js for Allure 3
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - name: Install Allure 3 CLI
        run: npm install -g allure

      - name: Run Tests
        run: uv run pytest --alluredir=allure-results
        continue-on-error: true

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore Allure history to results
        run: |
          mkdir -p allure-results
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history allure-results/
          fi

      - name: Generate Allure 3 Report
        run: |
          allure generate allure-results \
            --config ./allurerc.js \
            --history ./gh-pages \
            --clean

      - name: Deploy Allure report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          keep_files: false

      - name: Comment PR with Allure Report link
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ✅ Allure report for this PR is available [here](https://nottezz.github.io/API-e2e-tests-examples/)